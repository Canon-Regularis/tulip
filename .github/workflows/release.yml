# Release pipeline, triggered by pushing a version tag (v0.1.0, v0.2.0, ...).
#
# Three stages: build and verify the distribution, create the GitHub Release
# with notes taken from CHANGELOG.md, and publish to PyPI. Publishing uses
# trusted publishing (OIDC), so no API token is stored in the repository; the
# PyPI project must list this repository and workflow as a trusted publisher,
# and the `pypi` environment must exist in the repository settings.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Guard that the tag matches the package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag v$TAG_VERSION does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Verify citation metadata matches the released version
        run: |
          pip install --quiet dist/*.whl
          tulip cite --check
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract this version's notes from CHANGELOG.md
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Stops at the next version heading and at the trailing block of
          # link-reference definitions, so neither leaks into the notes.
          awk -v ver="$TAG_VERSION" \
            '$0 ~ "^## \\[" ver "\\]" {flag=1; next} /^## \[/ {flag=0} /^\[[^]]*\]: / {flag=0} flag' \
            CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "no CHANGELOG.md section found for $TAG_VERSION" >&2
            exit 1
          fi
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "tulip $GITHUB_REF_NAME" \
            --notes-file release-notes.md

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
