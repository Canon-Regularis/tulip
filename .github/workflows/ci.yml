name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A superseded push has nothing useful left to say; cancel it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check src tests
      - run: ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # tulip is developed on 3.14, so 3.14 is tested here. The floor is 3.11,
        # matching `requires-python` in pyproject: the code imports tomllib, a
        # standard-library module only from 3.11, so 3.10 cannot run it. The
        # floor was raised to 3.11 deliberately (not by papering over an untested
        # 3.10), and 3.11 is the lowest matrix entry, so the declared floor is
        # exercised on every run.
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # torch-backed extras (transformers/speech) are deliberately absent: their
      # tests skip via pytest.importorskip, and installing them costs multiple GB.
      #
      # If the 3.14 entry ever fails to INSTALL, suspect `serve`: uvicorn[standard]
      # pulls uvloop on Linux, which historically lags new CPython releases. Drop
      # `serve` from that entry's extras rather than dropping the Python version.
      - run: pip install -e ".[dev,boosting,viz,explain,serve,hf,audio]"
      # The coverage floor lives in [tool.coverage.report] fail_under; pytest-cov
      # honours it, so a coverage regression fails this job on its own.
      - run: pytest -q -m "not slow" --cov=tulip --cov-report=term --cov-report=xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          # upload-artifact@v4 errors on duplicate names across matrix jobs.
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  lock:
    # A lockfile nothing verifies is decoration. This fails when pyproject.toml
    # changed without re-running `uv lock`, so uv.lock cannot silently go stale.
    # Installs still use pip; the lock exists for reproducible `uv sync`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install uv
      - run: uv lock --check

  repro:
    # The reproducible leaderboard must actually be reproducible. This gate
    # regenerates the whole synthetic suite twice and diffs the guaranteed
    # artifacts (leaderboard.md, provenance.json, significance-*), so any hidden
    # nondeterminism -- an unseeded RNG, a dict-ordering leak, a moved generator
    # default -- fails CI instead of silently shipping.
    #
    # It checks SAME-RUN determinism, not a match against the committed board:
    # the committed numbers are generated on the maintainer's platform, and BLAS
    # differences across OSes can perturb the last ULP of a probability-derived
    # metric. `tulip repro verify` performs the stricter match-the-committed
    # check locally, on the platform that produced the board.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e "."
      - name: Regenerate the suite twice and diff the deterministic artifacts
        run: |
          tulip leaderboard benchmarks/suite.yaml --out run-a >/dev/null
          tulip leaderboard benchmarks/suite.yaml --out run-b >/dev/null
          board=synthetic-leaderboard
          diff "run-a/$board/leaderboard.md" "run-b/$board/leaderboard.md"
          diff "run-a/$board/provenance.json" "run-b/$board/provenance.json"
          for artifact in run-a/$board/significance-*.md run-a/$board/significance-*.json; do
            diff "$artifact" "run-b/$board/$(basename "$artifact")"
          done
          echo "leaderboard suite is deterministic"

  typecheck:
    # Blocking. mypy reports zero issues across the package today, so gating
    # costs nothing now and stops a type regression from ever merging.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy

  docs:
    # `--strict` fails the build on a broken mkdocstrings reference or a dead
    # link, so the API docs cannot silently rot as the public API changes. The
    # package is installed so the python handler can import and introspect it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict

  metadata:
    # A published benchmark must cite a consistent version. This fails when
    # CITATION.cff or .zenodo.json drifts from the pyproject version, so a
    # release cannot ship a citation that names the wrong version.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e "."
      - run: tulip cite --check

  build:
    # Catches packaging regressions that an editable install hides -- a missing
    # py.typed marker, or the dialect-marker lexicon not shipped as package data.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Install the built wheel into a clean env and smoke it
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/python -m pip install --quiet dist/*.whl
          /tmp/wheelcheck/bin/python -c "import importlib.resources as r, tulip; root = r.files('tulip'); lex = root / 'features' / 'text' / 'lexicons'; assert (root / 'py.typed').is_file(), 'py.typed missing from the wheel'; assert (lex / 'dialect_markers.yaml').is_file(), 'dialect lexicon not shipped as package data'; assert (lex / 'isoglosses.yaml').is_file(), 'isogloss lexicon not shipped as package data'; print('wheel ok:', tulip.__version__)"
          /tmp/wheelcheck/bin/tulip --version

  docker:
    # The Dockerised reproduce-from-scratch container must build and run. Byte-
    # exact matching against the committed board is platform sensitive (the board
    # is generated on the maintainer's platform, and BLAS differences across OSes
    # perturb the last ULP of a probability-derived metric), so this proves the
    # image builds and the whole pipeline builds the dataset, trains, and renders
    # the board end to end in a clean room, not a match against the committed
    # numbers. `tulip repro from-scratch` performs the stricter match-the-committed
    # check on the platform that produced the board.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the reproduce image
        run: docker build -t tulip-repro .
      - name: Smoke the CLI and regenerate the board in the container
        run: |
          docker run --rm tulip-repro tulip --version
          docker run --rm tulip-repro tulip leaderboard benchmarks/suite.yaml --out /tmp/board

  docker-serve:
    # The serving image must build (which trains the baked synthetic model) and
    # come up healthy: the container starts, /health answers 200, and /predict
    # returns a prediction for a Polish sentence.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the serving image
        run: docker build -f Dockerfile.serve -t tulip-serve .
      - name: Start the container and probe the API
        run: |
          docker run -d --name tulip-serve -p 8000:8000 tulip-serve
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then break; fi
            if [ "$(docker inspect -f '{{.State.Running}}' tulip-serve)" != "true" ]; then
              echo "container exited during startup" >&2
              exit 1
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS -X POST http://127.0.0.1:8000/predict/text \
            -H "Content-Type: application/json" \
            -d '{"text": "baca pognal owce na hale"}'
      - name: Container logs and cleanup
        # Runs on failure too; the logs matter most when the probe failed.
        if: always()
        run: |
          docker logs tulip-serve || true
          docker rm -f tulip-serve || true
