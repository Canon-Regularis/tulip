# Reproducible tulip leaderboard suite.
#
# Every config below uses the offline "synthetic" corpus, so the entire suite
# runs deterministically with no downloads and no locally acquired data. Each
# competitor model is trained on every config's identical, speaker-disjoint,
# frozen split. See benchmarks/README.md for the reproducibility guarantee and
# regeneration instructions.
name: synthetic-leaderboard

# Rendered above the table in the committed leaderboard.md, so the fixture can
# never be mistaken for a real result when read on its own.
caption: >-
  **Synthetic fixture, not real dialect accuracy.** These scores come from a
  procedurally generated corpus that exercises the pipeline; they say nothing
  about real dialect classification. See docs/benchmark.md and
  benchmarks/results/real-text-leaderboard/ for the real benchmark.

configs:
  - benchmarks/configs/char_baseline.yaml
  - benchmarks/configs/lexical_baseline.yaml

# Classical competitors only (no heavy or optional dependencies). The majority
# baseline is listed first so the table opens with the floor every model beats.
models:
  - majority
  - naive_bayes
  - logistic_regression
  - linear_svm
  - random_forest

# Top-label calibration (ECE/MCE/Brier) with 10 uniform bins, so the board
# surfaces over-confidence alongside accuracy. Deterministic, so the committed
# ECE/Brier columns regenerate byte-for-byte.
calibration_bins: 10
